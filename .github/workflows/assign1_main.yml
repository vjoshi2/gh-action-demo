name: Master branch build and test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

#Prevent duplicate builds for the same branch, productivity
concurrency:
  group: main-${{ github.ref }}
  cancel-in-progress: true

#Least-privilege permissions, security
permissions:
  contents: read
  id-token: write #oidc
  attestations: write #github attestation

env:
  JAVA_VERSION: '17'
  DOCKER_IMAGE: docker.io/${{ vars.DOCKERHUB_USERNAME }}/gh-action-demo

jobs:
  #1. Build, test, and package
  build:
    name: Build and test
    runs-on: ubuntu-latest
    timeout-minutes: 15 #Always add timeout

    steps:
      #Checkout source code
      - name: Checkout source code
        uses: actions/checkout@v6

      #Set up java with maven dependency cache
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      #Build, test, package, verify with debug to see hidden failures
      - name: Build and run tests
        run: |
          set -euo pipefail
          mvn -B clean verify --no-transfer-progress

      #Upload build artifact (optional), just want to showcase artifacts
      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 7

  #2. — Build and push docker image
  docker:
    name: Docker build and push
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15

    #Not using environment features really, but we can use env level secrets, restrictions/approvals, protection rules etc
    environment:
      name: production

    steps:
      #Checkout source code
      - name: Checkout source code
        uses: actions/checkout@v6

      #Download artifacts
      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: app-jar
          path: target/

      # #Generate docker metadata for tags, which is later used (steps, labels)
      # Tags:
      # - latest
      # - sha-<commit>
      # - YYYY.MM.DD-<sha>
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-
            type=raw,value={{date 'YYYY.MM.DD'}}-{{sha}}

      #Set up docker buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      #Log in to docker hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      #Vulnerability scan
      - name: Scan Docker image for vulnerabilities
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          output: trivy-report.txt
          exit-code: 0
          severity: CRITICAL,HIGH

      #Build and push Docker image, reuses previous docker build cache and saves current. Also include provenance and sbom.
      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        id: push
        with:
          context: .
          # platforms: linux/amd64,linux/arm64 #you can use multi platform if you want to use matrix
          push: true

          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

          cache-from: type=gha,scope=production
          cache-to: type=gha,scope=production,mode=max

          provenance: true
          sbom: true

      # Generate signed build provenance attestation
      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ${{ env.DOCKER_IMAGE }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      #Build summary
      - name: Publish workflow summary
        run: |
          {
            echo "## ✅ Main Release Complete"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Branch | \`${GITHUB_REF_NAME}\` |"
            echo "| Commit | \`${GITHUB_SHA::7}\` |"
            echo "| Docker Image | \`${{ env.DOCKER_IMAGE }}\` |"
            echo "| Tags |"
            echo "\`${{ steps.meta.outputs.tags }}\` |"
            echo ""
            echo "## 🔒 Trivy Security Scan"
            echo ""

            echo '```'
            cat trivy-report.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
