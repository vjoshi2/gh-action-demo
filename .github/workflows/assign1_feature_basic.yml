name: Feature branch build and test

on:
  push:
    branches:
      - 'feature/**'
      - 'feat/**'

# Prevent duplicate builds for the same branch, productivity
concurrency:
  group: feature-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege permissions, security
permissions:
  contents: read

env:
  JAVA_VERSION: '17'
  DOCKER_IMAGE: docker.io/${{ vars.DOCKERHUB_USERNAME }}/gh-action-demo

jobs:
  build-and-push:
    name: Build, test, dockerize & push
    runs-on: ubuntu-latest
    timeout-minutes: 15 #Always add timeout

    steps:
      #Checkout source code
      - name: Checkout source code
        uses: actions/checkout@v6

      #Set up java with maven dependency cache
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      #Build, test, package, verify with debug to see hidden failures
      - name: Build and run tests
        run: |
          set -euo pipefail
          mvn -B clean verify --no-transfer-progress

      #Generate docker metadata for tags, which is later used (steps, labels)
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha

      #Set up docker buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      #Log in to docker hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      #Build and push docker image, reuses previous docker build cache and saves current.
      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true

          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

          cache-from: type=gha,scope=feature
          cache-to: type=gha,scope=feature,mode=max

      #Build summary
      - name: Publish workflow summary
        run: |
          {
            echo "## ✅ Feature Branch CI Completed"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Branch | \`${GITHUB_REF_NAME}\` |"
            echo "| Commit | \`${GITHUB_SHA::7}\` |"
            echo "| Docker Image | \`${{ env.DOCKER_IMAGE }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

