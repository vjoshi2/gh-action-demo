name: Assign 4 - Master branch build and test with reusable workflow

on:
  push:
    branches:
      - master
#   pull_request:
#     branches:
#       - master

# Prevent duplicate builds for the same branch, productivity
concurrency:
  group: master-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege permissions, security
# Note: id-token, attestations permissions are declared inside the reusable workflow
permissions:
  contents: read
  pull-requests: write # sonarcloud PR inline comments
  checks: write        # sonarcloud check results on commits
  id-token: write
  attestations: write
  security-events: write
  
env:
  JAVA_VERSION: '17'

jobs:
  # 1. CodeQL Security Scan
  codeql:
    name: CodeQL Java Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'java-kotlin' ]

    steps:
      # Checkout source code
      - name: Checkout source code
        uses: actions/checkout@v6

      # Setup JDK
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      # Initialize CodeQL
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

          # Optional: Use security-and-quality rules
          queries: security-and-quality

      # Autobuild project
      # You can replace with manual Maven build if needed
      - name: Build project for CodeQL
        run: |
          set -euo pipefail
          mvn -B clean compile --no-transfer-progress

      # Perform CodeQL Analysis
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

  #2. Build, test, and package
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout source code
        uses: actions/checkout@v6

      # Set up Java with Maven dependency cache
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      #Build, test, package, verify with debug to see hidden failures
      - name: Build and run tests
        run: |
          set -euo pipefail
          mvn -B clean verify --no-transfer-progress

      # Upload build artifact — consumed by the reusable docker workflow
      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 7

  #3. Build and push docker image with reusable workflow.
  docker:
    name: Docker build and push
    needs: 
      - build
      - codeql
    uses: ./.github/workflows/assign3_reusable_docker_build.yml
    with:
      docker_image: docker.io/${{ vars.DOCKERHUB_USERNAME }}/gh-action-demo
      artifact_name: app-jar
      dockerhub_username: ${{ vars.DOCKERHUB_USERNAME }}
    secrets:
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  #4. Publish workflow summary.
  summary:
    name: Publish workflow summary
    runs-on: ubuntu-latest
    needs: docker
    if: always()   # run even if docker job failed, so we always get a summary

    steps:
      - name: Publish workflow summary
        run: |
          {
            echo "## ✅ Release Complete"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Branch | \`${GITHUB_REF_NAME}\` |"
            echo "| Commit | \`${GITHUB_SHA::7}\` |"
            echo "| Docker Image | \`docker.io/${{ vars.DOCKERHUB_USERNAME }}/gh-action-demo\` |"
            echo "| Tags | \`${{ needs.docker.outputs.image_tags }}\` |"
            echo ""
            echo "## 🔒 Trivy Security Scan"
            echo ""
            echo '```'
            echo "${{ needs.docker.outputs.trivy_report }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"